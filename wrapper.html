    <style>
  body{
  min-height: 100vh;
  background: white;

.button{
  padding:13px 40px;
  border: none;
  border-radius: 8px;
  font-size:25px;
  background-color:black;
  color:white;
  position: absolute;
  display: block;
  left:85%;

  top:14px;
}
.button:hover{
  background: rgb(121, 1, 1);
  transition: 0.4s;
  padding-left:70px;
}
.button i{
  position: absolute;

  left:-14px;
  font-size: 34px;
  top:14%;
  z-index:-200;
  transition:0.4s ease, opacity 0s ease-in-out;
}
.button:hover i{
  left:5%;

  top:14%;
}
.button span{
  z-index:10;
}

.btn:hover i{

}
.btn:hover{
  padding-right: 60px;

.btn::before{

}
.btn:hover::before{

  }
  10%,70%{
    opacity:1;
  }
  100%{
    opacity: 0;
  }
}

.menu button i{

font-size:20px;

.main{

}
.view{

}
.view.active{
  opacity: 1;

.card{

  box-shadow:0 0 10px rgba(0,0,0.80);
  border-radius: 9px;

  animation-play-state: running;
  animation-range:view();
}
@keyframes fade{
  from{
    transform:translateY(40px);
  }
  to{
    transform: translateY(0px);
  }
}

.list{

}
.list li{

}
.list button{
  padding:10px 10px;

  border: none;
  color:white;

}

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">Pro <span>system</span></div>
      <div class="menu">
        <header>
          <h1>Main </h1>
        <button  class="active" data-view="dashboard"><i class="fa-solid fa-house"></i>Dashboard</button>
        <button data-view="statistics"><i class="fa-solid fa-chart-bar fa-rotate-270"></i>Statistics</button>
        <button data-view="projects"><i class="fa-solid fa-diagram-project"></i>Projects</button>
        </header>
        <header>
          <h1>IELTS Practice</h1>
        <button data-view="speaking"><i class="fa-solid fa-microphone"></i>Speaking</button>
        <button data-view="listening"><i class="fa-solid fa-headphones"></i>Listening</button>
        <button data-view="reading"><i class="fa-solid fa-book-open"></i>Reading</button>
        <button data-view="writing"><i class="fa-solid fa-pen-to-square"></i>Writing</button>
        </header>
                <header>
          <h1>Others</h1>
        <button data-view="analystics"><i class="fa-solid fa-chart-line"></i>Analystics</button>
        <button data-view="settings"><i class="fa-solid fa-gear"></i>Settings</button>
        <button data-view="feedback"><i class="fa-solid fa-comment-dots"></i>Feedback</button>
        </header>
      </div>
      </aside>
  <div class="main">
    <header>
      <h1 id="title">Dashboard</h1>
    </header>
    <section class="view active" id="dashboard">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
    </section>
    <section class="view" id="statistics"></section>
    <section class="view" id="projects"></section>
    <section class="view" id="speaking"></section>
    <section class="view" id="listening"></section>
    <section class="view" id="reading"></section>
    <section class="view" id="writing"></section>
    <section class="view" id="analystics">
      <div class="list">
        <input type="text" id="text">
        <ul id="list">
        </ul>
        <button id="listbtn">add</button>
      </div>
    </section>
    <section class="view" id="settings"></section>
    <section class="view" id="feedback"></section>
          <button class="button" id="btn-profil">
          <i class="fa-solid fa-circle-user"></i> 
          <span>
          My Profile
          </span>
        </button>
          <div class="profil-card" id="profil-card">
            <button class="btn" id="exit-btn">
              <span>Exit</span>
            <label for="exit-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i></label>
           </button>
            <header>
              <h1>Your Profile Information</h1>
              <p id="result"></p>
            </header>
            </div>
  </div>
</div>
      <script>
        const btn=document.getElementById("btn-profil");
        const profilcard=document.getElementById("profil-card");
        const exit=document.getElementById("exit-btn");
        

        document.getElementById("listbtn").addEventListener("click", function(){
        
          const li=document.createElement("li");

          li.textContent=document.getElementById("text").value;

          const deletebtn=document.createElement("button");
          deletebtn.textContent="❌";

          li.appendChild(deletebtn);
      
          document.getElementById("list").appendChild(li);
          deletebtn.addEventListener("click", function(){
            li.remove();
          });
          document.getElementById("text").value="";
         
        });
        

  btn.addEventListener("click", function(e){

    profilcard.style.display="block";

       let data = localStorage.getItem("user");

   if(data){
      let user = JSON.parse(data);

      document.getElementById("result").innerHTML =
      "Ism: " + user.name + "<br>Parol: " + user.pass + "<br>Email:" + user.email;
   }
  });

  exit.addEventListener("click", function(e){
    profilcard.style.display="none";
  });
//Menu buttons and Views content
const buttons=document.querySelectorAll(".menu button");
const views=document.querySelectorAll(".view");

buttons.forEach(btn=>{
  btn.addEventListener("click", function(){

    buttons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    views.forEach(v=>v.classList.remove("active"));

    const target=btn.dataset.view;
    document.getElementById(target).classList.add("active");

    title.textContent=btn.textContent;
  });
});
      </script>
