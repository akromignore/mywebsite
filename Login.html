<body>
    <form>
      <fieldset id="fieldset">
        <legend>Asosiy Ma'lumotlar</legend>
        <header>
          <h1>Login | Registration</h1>
        </header>
        <div class="field">
          <label for="username"><i class="fa-solid fa-user"></i></label>
          <input type="username" id="username" placeholder="Username">
          <small></small>
        </div>
        <div class="field">
          <label for="email"><i class="fa-solid fa-envelope"></i></label>
          <input type="email" id="email" placeholder="Email">
          <small></small>
        </div>
        <div class="field">
          <label for="password"><i class="fa-solid fa-lock"></i></label>
          <input type="password" id="password" placeholder="Password">
          <small></small>
        </div>
        <button class="login-btn">
          <span>Send message</span>
          <i class="fa-solid fa-paper-plane"></i>
        </button>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
        <span>or login with other social platforms</span>
        <div class="social-icons">
        <i data-link="Facebook" style="--accent-color:blue;" class="fa-brands fa-facebook-f"></i>
        <i data-link="Google" style="--accent-color:orange;" class="fa-brands fa-google-plus-g"></i>
        <i data-link="Instagram" style="--accent-color:red;" class="fa-brands fa-instagram"></i>
        <i data-link="Twitter" style="--accent-color:rgb(29, 180, 240);" class="fa-brands fa-twitter"></i>
        </div>
      </fieldset>
    </form>
    <div class="card" id="card">
    </div>
    <div class="model" id="model">
      <span class="circle"></span>
    </div>
    <script>
// FORM va INPUTLAR
const form = document.querySelector("form");
const username = document.getElementById("username");
const email = document.getElementById("email");
const password = document.getElementById("password");
const card=document.getElementById("card");

// 🔥 SUBMIT EVENT
form.addEventListener("submit", function (e) {

  e.preventDefault();

  const usernameValid = checkUsername();
  const emailValid = checkEmail();
  const passwordValid = checkPassword();

  let usernameValue = username.value;
  let passwordValue = password.value;
  let emailvalue= email.value;
        let user = {
          name: usernameValue,
          pass: passwordValue,
          email:emailvalue
      };

      localStorage.setItem("user", JSON.stringify(user));

  if (usernameValid && emailValid && passwordValid) {
        card.innerHTML="Username - "+ usernameValue + "<br>Muvaffaqiyatli bajarildi!";
       card.style.transform="translateY(50px)";
      setTimeout(function(){
        card.style.transform="translateY(-200px)";         
      }, 3000);
      setTimeout(function(){
        document.getElementById("model").style.display="block";
      }, 4500);
      setTimeout(function(){
        document.getElementById("model").style.display="none";
      }, 5900);
      setTimeout(function() {
        window.location.href="wrapper.html";
      }, 6000);
  }
});

email.addEventListener("input", checkEmail);
password.addEventListener("input", checkPassword);
username.addEventListener("input", checkUsername);
// 🔥 USERNAME CHECK
function checkUsername() {
  const value = username.value.trim();
  const field = username.parentElement;

  if (value === "") {
    setError(field, "Username bo‘sh bo‘lmasin");
    return false;
  }
  if (value.length < 3) {
    setError(field, "Kamida 3 ta harf");
    return false;
  }

  setSuccess(field);
  return true;
}


// 🔥 EMAIL CHECK
function checkEmail() {
  const value = email.value.trim();
  const field = email.parentElement;

  if (value === "") {
    setError(field, "Email bo‘sh bo‘lmasin");
    return false;
  }

  if (!value.includes("@") || !value.includes(".") || !value.includes("gmail.com")){
    setError(field, "Email noto‘g‘ri");
    return false;
  }

  setSuccess(field);
  return true;
}


// 🔥 PASSWORD CHECK
function checkPassword() {
  const value = password.value.trim();
  const field = password.parentElement;

  if (value === "") {
    setError(field, "Password bo‘sh bo‘lmasin");
    return false;
  }

  if (value.length < 6) {
    setError(field, "Kamida 6 ta belgi bo‘lsin");
    return false;
  }

  setSuccess(field);
  return true;
}


// 🔥 SET ERROR
function setError(field, message) {
  const small = field.querySelector("small");

  small.innerText = message;
  field.classList.add("error");
  field.classList.remove("success");
}


// 🔥 SET SUCCESS
function setSuccess(field) {
  const small = field.querySelector("small");
  small.innerText = "";
  field.classList.remove("error");
  field.classList.add("success");
}

const buttons=document.querySelectorAll(".menu button");
const views=document.querySelectorAll(".view");

buttons.forEach(btn=>{
  btn.addEventListener("click", function(){

    buttons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    views.forEach(v=>v.classList.remove("active"));

    const target=btn.dataset.view;
    document.getElementById(target).classList.add("active");

    title.textContent=btn.textContent;
  });
});
</script>
